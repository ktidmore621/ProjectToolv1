function showCancelModal(projectId) {
  openModal(`
    <div class="modal-header"><div class="modal-title">Cancel Project?</div></div>
    <div class="modal-body">
      <div class="text-muted" style="font-size:13px">Cancelling moves this project to History as a permanent read-only record. It cannot be reopened — a new project would be needed for this MCP.</div>
      <div class="form-group"><label>Cancellation reason</label><textarea id="m_cancelReason" placeholder="Why is this project being cancelled?"></textarea></div>
      <div class="modal-error" id="modalError"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="dismissModal()">Keep Project</button>
      <button class="btn btn-danger" onclick="confirmCancel('${escHtml(projectId)}')">Cancel Project</button>
    </div>`);
}
function confirmCancel(projectId) {
  const reason = document.getElementById('m_cancelReason').value.trim();
  if (!reason) { modalError('A cancellation reason is required.'); return; }
  dismissModal();
  cancelProject(projectId, reason);
  navigate('history');
}

function showCloseModal(projectId) {
  const p = getProject(projectId);
  const blockers = closureBlockers(p);
  const ok = blockers.length === 0;
  const admin = isAdmin();

  const checklist = `
    <div class="checklist">
      <div class="checklist-item"><span class="${ok ? 'check-ok' : 'check-bad'}">${ok ? '✓' : '✗'}</span>
        ${ok ? 'All required tasks are Complete or formally Skipped.'
             : `${blockers.length} required task${blockers.length > 1 ? 's are' : ' is'} still open:`}
      </div>
      ${blockers.map(t => `<div class="checklist-item" style="padding-left:22px;color:var(--text-muted)">• ${escHtml(t.name)} (${escHtml(t.status)})</div>`).join('')}
    </div>`;

  openModal(`
    <div class="modal-header"><div class="modal-title">Close Project ${escHtml(p.id)}</div></div>
    <div class="modal-body">
      ${checklist}
      ${!ok && admin ? '<div class="text-muted" style="font-size:12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px">As an admin you may override and close anyway. The override is recorded in the activity history.</div>' : ''}
      ${!ok && !admin ? '<div class="text-muted" style="font-size:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px">Closure is blocked until required tasks are completed or formally skipped (or ask an admin to override).</div>' : ''}
      <div class="form-group"><label>Close reason</label><select id="m_closeReason">${selOptions(CLOSE_REASONS, CLOSE_REASONS[0])}</select></div>
      <div class="form-group"><label>Final summary</label><textarea id="m_finalSummary" placeholder="Outcome for the customer — is the customer in a better billing position than at the start?"></textarea></div>
      <div class="modal-error" id="modalError"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="dismissModal()">Cancel</button>
      <button class="btn btn-success" onclick="confirmClose('${escHtml(projectId)}')" ${!ok && !admin ? 'disabled' : ''}>
        ${!ok && admin ? 'Override & Close' : 'Close Project'}
      </button>
    </div>`);
}
function confirmClose(projectId) {
  const p = getProject(projectId);
  const blockers = closureBlockers(p);
  if (blockers.length > 0 && !isAdmin()) { modalError('Required tasks are still open.'); return; }
  const finalSummary = document.getElementById('m_finalSummary').value.trim();
  if (!finalSummary) { modalError('A final summary is required to close the project.'); return; }
  const closeReason = document.getElementById('m_closeReason').value;
  dismissModal();
  closeProject(projectId, { finalSummary, closeReason, overridden: blockers.length > 0 });
  navigate('history');
}

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Template</th><th>Description</th><th>Tasks</th><th>Status</th><th>Actions</th></tr></thead>

function getTplDraft() {
  if (tplDraft) return tplDraft;
  const data = getData();
  if (currentTemplateId) {
    const t = getTemplate(data, currentTemplateId);
    tplDraft = JSON.parse(JSON.stringify(t));
  } else {
    tplDraft = {
      id: null, name: '', description: '', isDefault: false, isActive: true,
      createdBy: currentUser(), createdDate: Date.now(),
      tasks: [{ id: 1, order: 1, name: '', description: '', required: true, priority: 'Medium', dueOffsetDays: 7 }],
    };
  }
  return tplDraft;
}

function renderTemplateEdit() {
  if (!isAdmin()) { navigate('templates'); return ''; }
  const t = getTplDraft();
  const taskRows = t.tasks.map((tt, i) => `
    <div class="tpl-task-row">
      <div class="task-num">${i + 1}</div>
      <input type="text" placeholder="Task name" value="${escHtml(tt.name)}" onchange="tplTaskField(${i}, 'name', this.value)" />
      <select onchange="tplTaskField(${i}, 'priority', this.value)">${selOptions(PRIORITIES, tt.priority)}</select>
      <div style="display:flex;align-items:center;gap:5px">
        <input type="number" style="width:64px" min="0" value="${tt.dueOffsetDays ?? 0}" onchange="tplTaskField(${i}, 'dueOffsetDays', parseInt(this.value,10)||0)" title="Due date offset in days from assignment date" />
        <span style="font-size:11px;color:var(--text-muted)">days</span>
      </div>
      <label style="display:flex;align-items:center;gap:5px;text-transform:none;font-size:12px;cursor:pointer">
        <input type="checkbox" ${tt.required ? 'checked' : ''} onchange="tplTaskField(${i}, 'required', this.checked)" /> Required
      </label>
      <div class="tpl-move">
        <button onclick="tplMoveTask(${i}, -1)" ${i === 0 ? 'disabled' : ''} title="Move up">▲</button>
        <button onclick="tplMoveTask(${i}, 1)" ${i === t.tasks.length - 1 ? 'disabled' : ''} title="Move down">▼</button>
        <button onclick="tplRemoveTask(${i})" ${t.tasks.length <= 1 ? 'disabled' : ''} title="Remove">✕</button>
      </div>
    </div>`).join('');

  return `
    <a class="back-link" onclick="tplDraft=null; navigate('templates')">← Back to Templates</a>
    <div class="card" style="max-width:860px">
      <div class="card-header"><span class="card-title">${t.id ? 'Edit Template' : 'New Template'}</span></div>
      <div class="form-grid">
        <div class="form-group"><label>Template name</label><input type="text" id="t_name" value="${escHtml(t.name)}" placeholder="e.g. Standard Customer Assignment" onchange="tplField('name', this.value)" /></div>
        <div class="form-group"><label>Active</label>
          <select id="t_active" onchange="tplField('isActive', this.value === 'yes')">
            <option value="yes" ${t.isActive ? 'selected' : ''}>Active — available for new projects</option>
            <option value="no" ${!t.isActive ? 'selected' : ''}>Inactive</option>
          </select>
        </div>
        <div class="form-group full"><label>Description</label><input type="text" id="t_desc" value="${escHtml(t.description)}" onchange="tplField('description', this.value)" /></div>
      </div>
      <div class="task-section-header" style="border-top:1px solid var(--border)">
        <span class="task-section-title">Template tasks (in workflow order)</span>
        <button class="btn btn-ghost btn-sm" onclick="tplAddTask()">+ Add Task</button>
      </div>
      <div class="tpl-task-row" style="background:var(--bg)">
        <div></div>
        <div class="task-col-label">Task name</div>
        <div class="task-col-label">Priority</div>
        <div class="task-col-label">Due offset</div>
        <div class="task-col-label">Required</div>
        <div class="task-col-label">Order</div>
      </div>
      ${taskRows}
      <div class="form-error hidden" id="tplError" style="margin-top:16px"></div>
      <div class="form-actions" style="padding-top:20px">
        <button class="btn btn-ghost" onclick="tplDraft=null; navigate('templates')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTplDraft()">Save Template</button>
      </div>
    </div>`;
}

function tplField(field, value) { getTplDraft()[field] = value; }
function tplTaskField(idx, field, value) { getTplDraft().tasks[idx][field] = value; }
function tplAddTask() {
  const t = getTplDraft();
  const maxId = t.tasks.reduce((m, x) => Math.max(m, x.id), 0);
  t.tasks.push({ id: maxId + 1, order: t.tasks.length + 1, name: '', description: '', required: false, priority: 'Medium', dueOffsetDays: 7 });
  render();
}
function tplMoveTask(idx, dir) {
  const t = getTplDraft();
  const j = idx + dir;
  if (j < 0 || j >= t.tasks.length) return;
  [t.tasks[idx], t.tasks[j]] = [t.tasks[j], t.tasks[idx]];
  t.tasks.forEach((x, i) => x.order = i + 1);
  render();
}
function tplRemoveTask(idx) {
  const t = getTplDraft();
  if (t.tasks.length <= 1) return;
  t.tasks.splice(idx, 1);
  t.tasks.forEach((x, i) => x.order = i + 1);
  render();
}
function saveTplDraft() {
  const t = getTplDraft();
  const err = document.getElementById('tplError');
  if (!t.name.trim()) { err.textContent = 'Template name is required.'; err.classList.remove('hidden'); return; }
  if (t.tasks.some(x => !x.name.trim())) { err.textContent = 'Every template task needs a name.'; err.classList.remove('hidden'); return; }
  const data = getData();
  t.tasks.forEach((x, i) => x.order = i + 1);
  if (t.id) {
    const idx = data.templates.findIndex(x => x.id === t.id);
    if (idx >= 0) data.templates[idx] = t;
  } else {
    t.id = 'TPL-' + data.nextTemplateId++;
    if (data.templates.length === 0) t.isDefault = true;
    data.templates.push(t);
  }
  saveData(data);
  tplDraft = null;
  navigate('templates');
}

// ─────────────────────────────────────────────
//  VIEW: DASHBOARD
// ─────────────────────────────────────────────
function barList(items, color, fmt) {
  if (items.length === 0) return '<div class="chart-empty">No data yet.</div>';
  const max = Math.max(...items.map(i => i.value), 1);
  return `<div class="bar-list">` + items.map(i => `
    <div class="bar-row" title="${escHtml(i.label)}: ${escHtml(fmt ? fmt(i.value) : String(i.value))}">
      <div class="bar-label">${escHtml(i.label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(i.value / max * 100)}%;${color ? 'background:' + color(i) : ''}"></div></div>
      <div class="bar-value">${escHtml(fmt ? fmt(i.value) : String(i.value))}</div>
    </div>`).join('') + `</div>`;
}

function renderDashboard() {
  const data = getData();
  const active = activeProjects(data);
  const hist = historicalProjects(data);
  const today = todayISO();
  const cutoff30 = Date.now() - 30 * 86400000;

  // stat tiles
  let overdueTasks = 0, blockedTasks = 0;
  active.forEach(p => p.tasks.forEach(t => {
    if (!OPEN_TASK(t.status)) return;
    if (t.status === 'Blocked') blockedTasks++;
    if (t.dueDate && t.dueDate < today) overdueTasks++;
  }));
  let mins30 = 0;
  data.projects.forEach(p => p.timeLogs.forEach(l => { if (l.createdTs >= cutoff30) mins30 += l.hours * 60 + l.minutes; }));

  // projects by status
  const byStatus = PROJECT_STATUSES
    .map(s => ({ label: s, value: active.filter(p => p.status === s).length }))
    .filter(i => i.value > 0);

  // by RAG (status palette — label + count carry meaning, never color alone)
  const ragColors = { Red: 'var(--viz-critical)', Amber: 'var(--viz-warning)', Green: 'var(--viz-good)' };
  const byRag = ['Red', 'Amber', 'Green']
    .map(r => ({ label: r, value: active.filter(p => effectiveRag(p) === r).length, rag: r }))
    .filter(i => i.value > 0);

  // open work by assignee
  const byAssignee = {};
  active.forEach(p => p.tasks.forEach(t => {
    if (!OPEN_TASK(t.status)) return;
    const who = t.assignedTo || p.assignee || '—';
    byAssignee[who] = (byAssignee[who] || 0) + 1;
  }));
  const assigneeItems = Object.entries(byAssignee).map(([label, value]) => ({ label, value }))
    .sort((a, b) => b.value - a.value).slice(0, 8);

  // time by user (30 days)
  const byUser = {};
  data.projects.forEach(p => p.timeLogs.forEach(l => {
    if (l.createdTs < cutoff30) return;
    byUser[l.user || '—'] = (byUser[l.user || '—'] || 0) + l.hours * 60 + l.minutes;
  }));
  const userItems = Object.entries(byUser).map(([label, value]) => ({ label, value }))
    .sort((a, b) => b.value - a.value).slice(0, 8);

  // closed per month, last 6 months
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ key: `${d.getFullYear()}-${d.getMonth()}`, label: d.toLocaleDateString('en-US', { month: 'short' }), value: 0 });
  }
  hist.forEach(p => {
    if (!p.closedDate) return;
    const d = new Date(p.closedDate);
    const m = months.find(m => m.key === `${d.getFullYear()}-${d.getMonth()}`);
    if (m) m.value++;
  });
  const maxClosed = Math.max(...months.map(m => m.value), 1);

  // aging
  const aging = [...active].sort((a, b) => daysOpen(b) - daysOpen(a)).slice(0, 6);

  return `
    <div class="card-header" style="margin-bottom:20px;background:transparent;border:none;padding:0;box-shadow:none">
      <h1 style="font-size:20px;font-weight:700">Dashboard</h1>
      <button class="btn btn-primary" onclick="navigate('create')">+ Create Project</button>
    </div>

    <div class="dash-grid">
      <div class="stat-tile"><div class="stat-value">${active.length}</div><div class="stat-label">Active projects</div><div class="stat-sub">${hist.length} in history</div></div>
      <div class="stat-tile ${overdueTasks ? 'stat-alert' : ''}"><div class="stat-value">${overdueTasks}</div><div class="stat-label">Overdue open tasks</div><div class="stat-sub">across active projects</div></div>
      <div class="stat-tile ${blockedTasks ? 'stat-alert' : ''}"><div class="stat-value">${blockedTasks}</div><div class="stat-label">Blocked tasks</div><div class="stat-sub">need attention</div></div>
      <div class="stat-tile"><div class="stat-value">${fmtDuration(mins30)}</div><div class="stat-label">Time logged</div><div class="stat-sub">last 30 days</div></div>
    </div>

    <div class="dash-charts">
      <div class="card"><div class="card-header"><span class="card-title">Active projects by status</span></div>
        <div class="chart-body">${barList(byStatus)}</div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Active projects by RAG</span></div>
        <div class="chart-body">${barList(byRag, i => ragColors[i.rag])}</div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Open tasks by assignee</span></div>
        <div class="chart-body">${barList(assigneeItems)}</div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Time logged by user <span class="text-muted" style="font-size:11px;font-weight:400">(30 days)</span></span></div>
        <div class="chart-body">${barList(userItems, null, fmtDuration)}</div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Projects closed per month</span></div>
        <div class="chart-body">
          <div class="col-chart">
            ${months.map(m => `
              <div class="col-item" title="${m.label}: ${m.value} closed">
                ${m.value ? `<span class="col-val">${m.value}</span>` : ''}
                <div class="col-bar ${m.value ? '' : 'zero'}" style="height:${Math.max(Math.round(m.value / maxClosed * 100), 2)}%"></div>
              </div>`).join('')}
          </div>
          <div class="col-labels">${months.map(m => `<span class="col-month">${m.label}</span>`).join('')}</div>
        </div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Oldest active projects</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Project</th><th>MCP</th><th>Status</th><th>RAG</th><th>Days</th></tr></thead>
            <tbody>
              ${aging.length === 0 ? '<tr class="empty-row"><td colspan="5">No active projects.</td></tr>' : aging.map(p => `
                <tr class="clickable" onclick="navigate('detail','${escHtml(p.id)}')">
                  <td class="fw-600" style="color:var(--accent)">${escHtml(p.id)}</td>
                  <td>${escHtml(p.mcpName)}</td>
                  <td>${projectBadge(p.status)}</td>
                  <td>${ragChip(p)}</td>
                  <td class="fw-600">${daysOpen(p)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
//  DRAWER (notes & activity)
// ─────────────────────────────────────────────
let drawerCtx = null; // { projectId, taskId: number|null }

function openProjectDrawer(projectId) {
  const p = getProject(projectId);
  if (!p) return;
  _openDrawer({ projectId, taskId: null }, p.id + ' — Project Notes & Activity', 'Project', isTerminal(p));
}

function openTaskDrawer(projectId, taskId) {
  const p = getProject(projectId);
  if (!p) return;
  const t = p.tasks.find(t => t.id === taskId);
  if (!t) return;
  _openDrawer({ projectId, taskId }, t.name, 'Task Notes & Activity', isTerminal(p));
}

function _openDrawer(ctx, title, subtitle, readOnly) {
  closeDrawer();
  drawerCtx = ctx;

  const overlay = document.createElement('div');
  overlay.className = 'drawer-overlay';
  overlay.id = 'drawerOverlay';
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeDrawer();
  });

  const drawer = document.createElement('div');
  drawer.className = 'drawer';
  drawer.addEventListener('click', function(e) { e.stopPropagation(); });

  const editorHtml = readOnly
    ? `<div class="text-muted" style="font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px">This project is closed — notes are read-only.</div>`
    : `
      <div>
        <div class="rte-section-label">Add Note</div>
        <div class="rte-wrap">
          <div class="rte-toolbar">
            <button class="rte-btn" title="Bold" onmousedown="event.preventDefault();rteCmd('bold')"><b>B</b></button>
            <button class="rte-btn" title="Italic" onmousedown="event.preventDefault();rteCmd('italic')"><i>I</i></button>
            <button class="rte-btn" title="Underline" onmousedown="event.preventDefault();rteCmd('underline')"><u>U</u></button>
            <div class="rte-sep"></div>
            <button class="rte-btn" title="Bullet list" onmousedown="event.preventDefault();rteCmd('insertUnorderedList')" style="font-size:15px;letter-spacing:-1px">≡</button>
            <button class="rte-btn" title="Numbered list" onmousedown="event.preventDefault();rteCmd('insertOrderedList')" style="font-size:12px">1≡</button>
          </div>
          <div class="rte-editor" id="rteEditor" contenteditable="true" data-placeholder="Write a note…"></div>
        </div>
        <div class="rte-actions">
          <select class="note-cat-select" id="noteCategory" title="Note category">
            ${NOTE_CATEGORIES.map(c => `<option>${c}</option>`).join('')}
          </select>
          <button class="btn btn-primary" onclick="saveDrawerNote()">Save Note</button>
        </div>
      </div>`;

  drawer.innerHTML = `
    <div class="drawer-header">
      <div style="min-width:0">
        <div class="drawer-title-sub">${escHtml(subtitle)}</div>
        <div class="drawer-title">${escHtml(title)}</div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()" title="Close">✕</button>
    </div>
    <div class="drawer-body">
      ${editorHtml}
      <div>
        <div class="history-divider">
          <span class="history-divider-label">History</span>
          <div class="history-divider-line"></div>
        </div>
        <div id="drawerHistory"></div>
      </div>
    </div>`;

  overlay.appendChild(drawer);
  document.body.appendChild(overlay);

  const editor = document.getElementById('rteEditor');
  if (editor) editor.focus();

  renderDrawerHistory();
}

function closeDrawer() {
  document.getElementById('drawerOverlay')?.remove();
  drawerCtx = null;
  editDrawerProjectId = null;
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeDrawer(); dismissModal(); }
});

function rteCmd(cmd) {
  document.execCommand(cmd, false, null);
  const editor = document.getElementById('rteEditor');
  if (editor) editor.focus();
}

function saveDrawerNote() {
  if (!drawerCtx) return;
  const editor = document.getElementById('rteEditor');
  if (!editor) return;
  const html = editor.innerHTML.trim();

  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  if (!tmp.textContent.trim()) return;

  const category = document.getElementById('noteCategory')?.value || 'General Update';
  const { projectId, taskId } = drawerCtx;
  if (taskId === null) addProjectNote(projectId, html, category);
  else addTaskNote(projectId, taskId, html, category);

  editor.innerHTML = '';
  renderDrawerHistory();
}

function renderDrawerHistory() {
  const histEl = document.getElementById('drawerHistory');
  if (!histEl || !drawerCtx) return;

  const { projectId, taskId } = drawerCtx;
  const p = getProject(projectId);
  let entries = [];
  if (p) {
    if (taskId === null) entries = p.history || [];
    else {
      const t = p.tasks.find(t => t.id === taskId);
      entries = t ? (t.history || []) : [];
    }
  }

  const sorted = [...entries].sort((a, b) => b.ts - a.ts);

  if (sorted.length === 0) {
    histEl.innerHTML = '<div class="history-empty">No history yet.</div>';
    return;
  }

  histEl.innerHTML = '<div class="history-list">' + sorted.map(entry => {
    const ts = escHtml(formatTs(entry.ts));
    if (entry.type === 'activity') {
      return `
        <div class="history-entry is-activity">
          <div class="history-entry-meta">
            <span class="history-tag">Activity</span>
            <span class="history-ts">${ts}</span>
          </div>
          <div class="history-content-activity">${escHtml(entry.text)}</div>
        </div>`;
    } else {
      return `
        <div class="history-entry">
          <div class="history-entry-meta">
            ${entry.category ? `<span class="history-tag cat">${escHtml(entry.category)}</span>` : ''}
            ${entry.user ? `<span class="history-user">${escHtml(entry.user)}</span>` : ''}
            <span class="history-ts">${ts}</span>
          </div>
          <div class="history-content-note">${entry.html}</div>
        </div>`;
    }
  }).join('') + '</div>';
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
const NAV_ITEMS = [
  { view: 'dashboard', label: 'Dashboard' },
  { view: 'projects',  label: 'Projects' },
  { view: 'history',   label: 'History' },
  { view: 'templates', label: 'Templates', adminOnly: true },
];

function renderNav() {
  const nav = document.getElementById('mainNav');
  const groupOf = v => (v === 'create' || v === 'detail') ? (getProject(currentProjectId) && isTerminal(getProject(currentProjectId)) && currentView === 'detail' ? 'history' : 'projects') : (v === 'templateEdit' ? 'templates' : v);
  const activeGroup = groupOf(currentView);
  nav.innerHTML = NAV_ITEMS
    .filter(i => !i.adminOnly || isAdmin())
    .map(i => `<button class="nav-btn ${activeGroup === i.view ? 'active' : ''}" onclick="navigate('${i.view}')">${i.label}</button>`)
    .join('');
}

function renderUserBox() {
  const d = getData();
  const nameInput = document.getElementById('userNameInput');
  const roleSelect = document.getElementById('userRoleSelect');
  if (document.activeElement !== nameInput) nameInput.value = d.settings.currentUser;
  roleSelect.value = d.settings.role;
}

function render() {
  const app = document.getElementById('app');
  let html = '';
  if (currentView === 'dashboard')         html = renderDashboard();
  else if (currentView === 'projects')     html = renderProjects();
  else if (currentView === 'history')      html = renderHistory();
  else if (currentView === 'create')       html = renderCreate();
  else if (currentView === 'detail')       html = renderDetail();
  else if (currentView === 'templates')    html = renderTemplates();
  else if (currentView === 'templateEdit') html = renderTemplateEdit();
  app.innerHTML = html;

  renderNav();
  renderUserBox();
  document.querySelectorAll('.task-select').forEach(statusSelectStyle);
  if (currentView === 'create') renderTemplatePreview();
  saveUiState(); // keep view + filter selections for the session
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
getData(); // ensure migration + seed
loadUiState(); // restore view + filter selections for this session
render();
</script>
