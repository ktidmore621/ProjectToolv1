<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Assignment Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #eff6ff;
      --surface: #ffffff;
      --bg: #f8fafc;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.06);
      --radius: 8px;
      --radius-lg: 12px;

      /* Data-viz roles (reference palette) */
      --viz-series: #2a78d6;
      --viz-good: #0ca30c;
      --viz-warning: #fab219;
      --viz-serious: #ec835a;
      --viz-critical: #d03b3b;
      --viz-track: #eef1f5;
      --viz-muted: #898781;

      --status-not-started-bg: #f1f5f9;
      --status-not-started-text: #475569;
      --status-in-progress-bg: #dbeafe;
      --status-in-progress-text: #1d4ed8;
      --status-blocked-bg: #fee2e2;
      --status-blocked-text: #b91c1c;
      --status-complete-bg: #dcfce7;
      --status-complete-text: #15803d;
      --status-skipped-bg: #fef9c3;
      --status-skipped-text: #a16207;
      --status-cancelled-bg: #f3f4f6;
      --status-cancelled-text: #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 20px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .app-header .logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.3px;
      white-space: nowrap;
    }
    .app-header .logo span { color: var(--text-muted); font-weight: 400; }
    .app-nav { display: flex; gap: 4px; flex: 1; }
    .nav-btn {
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .nav-btn:hover { background: var(--bg); color: var(--text); }
    .nav-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .user-box { display: flex; align-items: center; gap: 8px; }
    .user-box label { font-size: 10px; }
    .user-box input, .user-box select {
      padding: 5px 8px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: inherit;
      background: var(--surface);
      outline: none;
    }
    .user-box input { width: 130px; }

    .main { max-width: 1180px; margin: 0 auto; padding: 32px 24px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .card-title { font-size: 16px; font-weight: 600; }
    .card-body { padding: 0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background .15s, box-shadow .15s, transform .1s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 2px 8px rgba(37,99,235,.3); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border-strong);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }
    .tab-btn {
      padding: 6px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.clickable { cursor: pointer; }
    tbody tr.clickable:hover { background: var(--accent-light); }
    tbody td { padding: 13px 16px; vertical-align: middle; }
    .empty-row td {
      text-align: center;
      color: var(--text-muted);
      padding: 48px 16px;
      font-size: 14px;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-not-started  { background: var(--status-not-started-bg);  color: var(--status-not-started-text); }
    .badge-in-progress  { background: var(--status-in-progress-bg);  color: var(--status-in-progress-text); }
    .badge-blocked      { background: var(--status-blocked-bg);       color: var(--status-blocked-text); }
    .badge-complete     { background: var(--status-complete-bg);      color: var(--status-complete-text); }
    .badge-skipped      { background: var(--status-skipped-bg);       color: var(--status-skipped-text); }
    .badge-cancelled    { background: var(--status-cancelled-bg);     color: var(--status-cancelled-text); }

    .badge-p-new                     { background: #f1f5f9; color: #475569; }
    .badge-p-assigned                { background: #e0f2fe; color: #0369a1; }
    .badge-p-in-progress             { background: #dbeafe; color: #1d4ed8; }
    .badge-p-pending-customer        { background: #fef3c7; color: #b45309; }
    .badge-p-pending-internal        { background: #fef3c7; color: #92400e; }
    .badge-p-action-plan-needed      { background: #ffedd5; color: #c2410c; }
    .badge-p-action-plan-in-progress { background: #ede9fe; color: #6d28d9; }
    .badge-p-ready-to-close          { background: #d1fae5; color: #047857; }
    .badge-p-closed                  { background: #dcfce7; color: #15803d; }
    .badge-p-cancelled               { background: #f3f4f6; color: #6b7280; }

    .rag-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 700;
    }
    .rag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .rag-green { background: #ecfdf5; color: #047857; }
    .rag-green .rag-dot { background: var(--viz-good); }
    .rag-amber { background: #fffbeb; color: #b45309; }
    .rag-amber .rag-dot { background: var(--viz-warning); }
    .rag-red { background: #fef2f2; color: #b91c1c; }
    .rag-red .rag-dot { background: var(--viz-critical); }
    .rag-manual { font-weight: 400; opacity: .75; font-size: 10px; }

    .risk-low      { background: #f1f5f9; color: #475569; }
    .risk-medium   { background: #fffbeb; color: #b45309; }
    .risk-high     { background: #fff7ed; color: #c2410c; }
    .risk-critical { background: #fef2f2; color: #b91c1c; }

    .prio-chip { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; padding: 1px 6px; border-radius: 4px; }
    .prio-low    { background: #f1f5f9; color: #64748b; }
    .prio-medium { background: #e0f2fe; color: #0369a1; }
    .prio-high   { background: #fef2f2; color: #b91c1c; }

    .req-star { color: var(--viz-critical); font-weight: 700; margin-left: 2px; }
    .lock-ico { color: var(--text-light); font-size: 11px; }
    .overdue-flag { color: var(--viz-critical); font-size: 11px; font-weight: 600; }

    /* ── Progress bar ── */
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      min-width: 80px;
      max-width: 120px;
    }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }
    .progress-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* ── Forms ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    input[type="text"], input[type="date"], input[type="number"], select, textarea {
      padding: 9px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    textarea { resize: vertical; min-height: 80px; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .form-actions { padding: 0 24px 24px; display: flex; gap: 10px; justify-content: flex-end; }
    .form-error {
      margin: 0 24px; padding: 10px 14px;
      background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius);
      color: #b91c1c; font-size: 13px;
    }

    /* ── Project detail ── */
    .detail-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 24px;
    }
    .detail-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .detail-pid { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .detail-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
    .meta-item { display: flex; flex-direction: column; gap: 4px; }
    .meta-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); }
    .meta-value { font-size: 14px; font-weight: 500; }
    .meta-select {
      padding: 5px 8px; border: 1px solid var(--border-strong);
      border-radius: var(--radius); font-size: 13px; font-family: inherit;
      background: var(--surface); outline: none; cursor: pointer;
    }
    .closed-banner {
      margin-bottom: 20px; padding: 12px 18px;
      border-radius: var(--radius-lg);
      background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534;
      font-size: 13px; display: flex; align-items: center; gap: 10px;
    }
    .closed-banner.is-cancelled { background: #f9fafb; border-color: var(--border-strong); color: var(--text-muted); }

    /* ── Tasks ── */
    .task-row { display: grid; grid-template-columns: 28px minmax(220px,1fr) 150px 140px 170px; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--border); transition: background .1s; }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: var(--bg); }
    .task-num { width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--text-muted); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .task-num.adhoc { background: var(--accent-light); color: var(--accent); }
    .task-name { font-size: 14px; }
    .task-sub { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
    .task-select {
      padding: 6px 10px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      background: var(--surface);
      outline: none;
      width: 100%;
    }
    .task-date-input {
      padding: 6px 10px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: inherit;
      background: var(--surface);
      outline: none;
      width: 100%;
    }
    .task-date-input:focus, .task-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .task-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .btn-notes {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 500;
      border-radius: var(--radius);
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s, border-color .12s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-notes:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
    .btn-notes.danger:hover { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      cursor: pointer;
      transition: color .15s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
      animation: fadeIn .15s ease;
      overflow-y: auto;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      width: 100%; max-width: 520px;
      animation: slideUp .2s ease;
      margin: auto;
    }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-body .form-group { gap: 6px; }
    .modal-actions { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .modal-error { color: #b91c1c; font-size: 13px; padding: 8px 12px; background: #fef2f2; border-radius: var(--radius); display: none; }
    .checklist { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .checklist-item { display: flex; align-items: center; gap: 8px; }
    .check-ok { color: var(--viz-good); font-weight: 700; }
    .check-bad { color: var(--viz-critical); font-weight: 700; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

    /* ── Confirm dialog ── */
    .confirm-body { padding: 20px 24px; color: var(--text-muted); font-size: 14px; line-height: 1.6; }
    .confirm-actions { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.35);
      z-index: 200;
      display: flex; justify-content: flex-end;
      animation: fadeIn .2s ease;
    }
    .drawer {
      width: 480px; max-width: 100vw;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 32px rgba(0,0,0,.12);
      display: flex; flex-direction: column;
      animation: slideInRight .25s ease;
    }
    .drawer-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-shrink: 0;
      background: var(--surface);
    }
    .drawer-title {
      font-size: 14px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .drawer-title-sub {
      font-size: 11px; color: var(--text-muted); font-weight: 400;
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 2px;
    }
    .drawer-close {
      width: 30px; height: 30px; border-radius: var(--radius);
      border: none; background: transparent; cursor: pointer;
      color: var(--text-muted); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }
    .drawer-close:hover { background: var(--bg); color: var(--text); }
    .drawer-body {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 24px;
    }

    /* ── Rich text editor ── */
    .rte-section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted); margin-bottom: 8px;
    }
    .rte-wrap {
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .rte-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .rte-toolbar {
      display: flex; align-items: center; gap: 2px; padding: 6px 8px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .rte-btn {
      width: 28px; height: 28px; border-radius: 4px;
      border: none; background: transparent; cursor: pointer;
      color: var(--text-muted); font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
      line-height: 1;
    }
    .rte-btn:hover { background: var(--border); color: var(--text); }
    .rte-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
    .rte-editor {
      min-height: 90px; max-height: 180px;
      padding: 10px 12px; outline: none;
      font-size: 14px; font-family: inherit; line-height: 1.6;
      color: var(--text); overflow-y: auto;
    }
    .rte-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--text-light);
      pointer-events: none;
    }
    .rte-editor ul, .rte-editor ol { padding-left: 20px; }
    .rte-actions { padding-top: 10px; display: flex; gap: 10px; align-items: center; }
    .note-cat-select {
      padding: 7px 10px; border: 1px solid var(--border-strong);
      border-radius: var(--radius); font-size: 12px; font-family: inherit;
      background: var(--surface); outline: none; cursor: pointer;
    }

    /* ── History ── */
    .history-divider { display: flex; align-items: center; gap: 10px; }
    .history-divider-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted); white-space: nowrap;
    }
    .history-divider-line { flex: 1; height: 1px; background: var(--border); }
    .history-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .history-entry {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 13px;
      background: var(--surface);
    }
    .history-entry.is-activity { background: var(--bg); border-color: var(--border); }
    .history-entry-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; flex-wrap: wrap; }
    .history-tag {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; padding: 1px 6px; border-radius: 99px;
      background: var(--border); color: var(--text-muted);
      border: 1px solid var(--border-strong); flex-shrink: 0;
    }
    .history-tag.cat { background: var(--accent-light); color: var(--accent); border-color: #bfdbfe; }
    .history-ts { font-size: 11px; color: var(--text-light); }
    .history-user { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .history-content-activity { font-style: italic; color: var(--text-muted); font-size: 13px; line-height: 1.5; }
    .history-content-note { font-size: 14px; line-height: 1.6; color: var(--text); }
    .history-content-note ul, .history-content-note ol { padding-left: 20px; }
    .history-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 28px 0; }

    /* ── Time log ── */
    .time-summary { display: flex; gap: 24px; padding: 16px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .time-stat { display: flex; flex-direction: column; gap: 2px; }
    .time-stat-value { font-size: 18px; font-weight: 700; }
    .time-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

    /* ── Dashboard ── */
    .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-tile {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow);
      padding: 18px 20px;
    }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -.5px; line-height: 1.2; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .stat-sub { font-size: 11px; color: var(--text-light); margin-top: 6px; }
    .stat-alert .stat-value { color: var(--viz-critical); }
    .dash-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .dash-charts .card { padding: 0; }
    .chart-body { padding: 18px 24px 22px; }
    .bar-list { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 130px 1fr 52px; align-items: center; gap: 10px; }
    .bar-label { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    .bar-track { height: 10px; background: var(--viz-track); border-radius: 0 4px 4px 0; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--viz-series); border-radius: 0 4px 4px 0; min-width: 2px; }
    .bar-value { font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .col-chart { display: flex; align-items: flex-end; gap: 12px; height: 130px; padding-top: 18px; border-bottom: 1px solid var(--border-strong); }
    .col-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 4px; min-width: 0; }
    .col-bar { width: 100%; max-width: 34px; background: var(--viz-series); border-radius: 4px 4px 0 0; min-height: 2px; }
    .col-bar.zero { background: var(--viz-track); }
    .col-val { font-size: 11px; font-weight: 600; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .col-labels { display: flex; gap: 12px; margin-top: 6px; }
    .col-month { flex: 1; text-align: center; font-size: 11px; color: var(--viz-muted); min-width: 0; }
    .chart-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 32px 0; }

    /* ── Template admin ── */
    .tpl-task-row { display: grid; grid-template-columns: 28px 1fr 110px 110px 90px 90px; gap: 10px; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .tpl-task-row:last-child { border-bottom: none; }
    .tpl-task-row input, .tpl-task-row select { padding: 6px 9px; font-size: 12px; }
    .tpl-move { display: flex; gap: 4px; }
    .tpl-move button {
      width: 24px; height: 24px; border: 1px solid var(--border-strong); background: var(--surface);
      border-radius: 6px; cursor: pointer; color: var(--text-muted); font-size: 11px; line-height: 1;
    }
    .tpl-move button:hover { background: var(--bg); color: var(--text); }
    .tpl-move button:disabled { opacity: .35; cursor: not-allowed; }
    .default-tag { background: var(--accent-light); color: var(--accent); border: 1px solid #bfdbfe; }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input {
      padding: 6px 10px; font-size: 12px;
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      background: var(--surface); outline: none; font-family: inherit;
    }

    /* ── View switcher ── */
    .view-switch {
      display: flex; gap: 2px;
      background: var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }
    .view-switch button {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border: none; border-radius: 6px;
      background: transparent; color: var(--text-muted);
      font-size: 13px; font-weight: 500; font-family: inherit;
      cursor: pointer; transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .view-switch button svg { width: 14px; height: 14px; flex-shrink: 0; }
    .view-switch button:hover { color: var(--text); }
    .view-switch button.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: var(--shadow); }

    /* ── Kanban filter bar ── */
    .kb-filterbar {
      position: sticky; top: 56px; z-index: 40;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 16px; margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .kb-filter-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted);
    }
    .ms-dd { position: relative; }
    .ms-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 12px;
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      background: var(--surface); color: var(--text-muted);
      font-size: 12px; font-weight: 500; font-family: inherit;
      cursor: pointer; transition: border-color .15s, color .15s, background .15s;
    }
    .ms-btn:hover { border-color: var(--accent); color: var(--text); }
    .ms-btn.has-sel { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 600; }
    .ms-count {
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700;
      min-width: 16px; height: 16px; padding: 0 4px;
      border-radius: 99px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .ms-caret { font-size: 9px; opacity: .7; }
    .ms-panel {
      position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 200px; max-height: 280px; overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 5px; z-index: 60;
    }
    .ms-opt {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px; border-radius: 6px;
      font-size: 13px; font-weight: 400; color: var(--text);
      text-transform: none; letter-spacing: 0;
      cursor: pointer; white-space: nowrap;
    }
    .ms-opt:hover { background: var(--bg); }
    .ms-opt input { accent-color: var(--accent); cursor: pointer; }
    .ms-empty { padding: 10px 12px; font-size: 12px; color: var(--text-muted); }

    /* ── Kanban board ── */
    .kb-board-wrap { overflow-x: auto; padding-bottom: 10px; }
    .kb-board { display: flex; gap: 14px; align-items: flex-start; min-height: 280px; }
    .kb-col {
      flex: 0 0 282px; width: 282px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex; flex-direction: column;
      max-height: calc(100vh - 240px);
      min-height: 150px;
    }
    .kb-col-head {
      padding: 11px 14px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .kb-col-title {
      font-size: 11.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .kb-col-count {
      margin-left: auto;
      background: var(--surface); color: var(--text-muted);
      border: 1px solid var(--border-strong);
      font-size: 11px; font-weight: 700;
      min-width: 22px; height: 20px; padding: 0 6px;
      border-radius: 99px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .kb-col-body {
      flex: 1; overflow-y: auto;
      padding: 10px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .kb-col-empty {
      text-align: center; color: var(--text-light);
      font-size: 12px; padding: 22px 0;
      border: 1px dashed var(--border-strong); border-radius: var(--radius);
    }
    .kb-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s, border-color .15s;
      animation: cardIn .25s ease;
    }
    .kb-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); border-color: var(--border-strong); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(6px) scale(.98); } to { opacity: 1; transform: none; } }
    .kb-card.card-moved { animation: cardMoved .9s ease; }
    @keyframes cardMoved {
      0% { box-shadow: 0 0 0 3px rgba(37,99,235,.5); transform: scale(1.02); }
      100% { box-shadow: var(--shadow); transform: none; }
    }
    .kb-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .kb-id { font-size: 12px; font-weight: 700; color: var(--accent); }
    .kb-kebab {
      width: 26px; height: 26px; margin: -4px -6px 0 0;
      border: none; border-radius: 6px;
      background: transparent; color: var(--text-muted);
      font-size: 16px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s;
      flex-shrink: 0;
    }
    .kb-kebab:hover { background: var(--bg); color: var(--text); }
    .kb-mcp { font-size: 14px; font-weight: 600; margin-top: 3px; line-height: 1.35; }
    .kb-mcp-num { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .kb-assignee {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-muted);
      margin-top: 8px;
    }
    .kb-avatar {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent-light); color: var(--accent);
      font-size: 9px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .kb-badges { display: flex; gap: 6px; flex-wrap: wrap; margin: 9px 0; }
    .kb-progress .progress-bar { max-width: none; }
    .upd-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .upd-green  { background: #ecfdf5; color: #047857; }
    .upd-yellow { background: #fffbeb; color: #b45309; }
    .upd-red    { background: #fef2f2; color: #b91c1c; }

    @media (max-width: 900px) {
      .kb-col { flex: 0 0 250px; width: 250px; }
      .kb-filterbar { top: 0; }
    }

    /* ── Utility ── */
    .hidden { display: none !important; }
    .text-muted { color: var(--text-muted); }
    .fw-600 { font-weight: 600; }
    .task-section-header { padding: 12px 16px 10px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .task-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-muted); }
    .task-col-header { display: grid; grid-template-columns: 28px minmax(220px,1fr) 150px 140px 170px; gap: 14px; padding: 8px 16px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .task-col-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); }

    @media (max-width: 900px) {
      .dash-grid { grid-template-columns: repeat(2, 1fr); }
      .dash-charts { grid-template-columns: 1fr; }
      .app-header { flex-wrap: wrap; height: auto; padding: 10px 16px; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="logo">Customer Assignment <span>Tracker</span></div>
  <nav class="app-nav" id="mainNav"></nav>
  <div class="user-box">
    <input type="text" id="userNameInput" placeholder="Your name" title="Current user" onchange="setCurrentUser(this.value)" />
    <select id="userRoleSelect" title="Role" onchange="setCurrentRole(this.value)">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>
  </div>
</header>

<main class="main" id="app"></main>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const STORAGE_KEY = 'cat_data_v2';
const LEGACY_KEY  = 'cat_data_v1';

const TASK_STATUSES = ['Not Started', 'In Progress', 'Blocked', 'Complete', 'Skipped', 'Cancelled'];
const OPEN_TASK = s => !['Complete', 'Skipped', 'Cancelled'].includes(s);

const PROJECT_STATUSES = [
  'New', 'Assigned', 'In Progress', 'Pending Customer', 'Pending Internal',
  'Action Plan Needed', 'Action Plan In Progress', 'Ready to Close',
];
const TERMINAL_STATUSES = ['Closed', 'Cancelled'];

const CLOSE_REASONS = [
  'Billing Improved', 'Issue Resolved', 'No Further Action Needed',
  'Customer Unresponsive', 'Transferred / Escalated',
];
const ACTIVITY_TYPES = [
  'Billing Analysis', 'Customer Visit', 'Internal Review', 'Action Plan Work',
  'Follow-Up', 'Documentation', 'Administrative',
];
const NOTE_CATEGORIES = [
  'General Update', 'Customer Contact', 'Billing Finding', 'Internal Follow-Up',
  'Risk', 'Issue', 'Action Plan', 'Resolution',
];
const RISK_LEVELS = ['Low', 'Medium', 'High', 'Critical'];
const PRIORITIES = ['Low', 'Medium', 'High'];

const DEFAULT_TEMPLATE_TASKS = [
  { name: 'Review customer billing history',    required: true,  priority: 'High',   dueOffsetDays: 3,  description: 'Pull and review the customer’s billing history for anomalies.' },
  { name: 'Complete billing analysis',          required: true,  priority: 'High',   dueOffsetDays: 7,  description: 'Full billing analysis for the assignment period.' },
  { name: 'Schedule / complete customer visit', required: false, priority: 'Medium', dueOffsetDays: 14, description: 'Visit the customer if the assignment calls for it.' },
  { name: 'Identify billing concerns',          required: true,  priority: 'High',   dueOffsetDays: 14, description: 'Document all billing concerns found during analysis and visit.' },
  { name: 'Determine if action plan is needed', required: true,  priority: 'Medium', dueOffsetDays: 16, description: 'Decision task: if Yes, add action plan tasks to the project.' },
  { name: 'Create action plan tasks',           required: false, priority: 'Medium', dueOffsetDays: 18, description: 'Only if an action plan is needed — add the ad-hoc action plan tasks.' },
  { name: 'Complete action plan follow-up',     required: false, priority: 'Medium', dueOffsetDays: 30, description: 'Follow up on all action plan items until resolved.' },
  { name: 'Final review',                       required: true,  priority: 'Medium', dueOffsetDays: 35, description: 'Verify the customer is in a better billing position than at the start.' },
  { name: 'Close project',                      required: true,  priority: 'Medium', dueOffsetDays: 40, description: 'Enter final summary and formally close the assignment.' },
];

// ─────────────────────────────────────────────
//  DATA LAYER
// ─────────────────────────────────────────────
function emptyData() {
  return {
    version: 2,
    nextProjectId: 1,
    nextTemplateId: 1,
    settings: { currentUser: '', role: 'user' },
    templates: [],
    projects: [],
  };
}

function loadData() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (raw && raw.version === 2) return raw;
  } catch {}
  return null;
}

function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function getData() {
  let data = loadData();
  if (!data) {
    data = emptyData();
    migrateLegacy(data);
    saveData(data);
  }
  seedDefaultTemplate(data);
  return data;
}

function seedDefaultTemplate(data) {
  if (data.templates.length > 0) return;
  const id = 'TPL-' + data.nextTemplateId++;
  data.templates.push({
    id,
    name: 'Standard Customer Assignment',
    description: 'Default workflow for customer assignment projects: billing review, analysis, visit, action plan decision, follow-up and closure.',
    isDefault: true,
    isActive: true,
    createdBy: 'System',
    createdDate: Date.now(),
    tasks: DEFAULT_TEMPLATE_TASKS.map((t, i) => ({ id: i + 1, order: i + 1, ...t })),
  });
  saveData(data);
}

// One-time migration of v1 data (flat task list, Open/Closed statuses).
function migrateLegacy(data) {
  let legacy = null;
  try { legacy = JSON.parse(localStorage.getItem(LEGACY_KEY)); } catch {}
  if (!legacy || !Array.isArray(legacy.projects)) return;
  data.nextProjectId = legacy.nextId || 1;
  legacy.projects.forEach(op => {
    data.projects.push({
      id: op.id,
      mcpNum: op.mcpNum, mcpName: op.mcpName,
      assignee: op.assignee, assignmentDate: op.assignmentDate,
      templateId: null, templateName: 'Legacy (pre-templates)',
      status: op.status === 'Closed' ? 'Closed' : 'In Progress',
      riskLevel: 'Low',
      ragOverride: null,
      createdDate: (op.history && op.history[0] && op.history[0].ts) || Date.now(),
      createdBy: op.assignee || '',
      closedDate: op.status === 'Closed' ? Date.now() : null,
      closedBy: '', closeReason: '', finalSummary: '', cancelReason: '',
      nextTaskId: (op.tasks ? op.tasks.length : 0) + 1,
      nextLogId: 1,
      tasks: (op.tasks || []).map((t, i) => ({
        id: t.id, name: t.name, description: '',
        order: i + 1, required: true, isAdHoc: false,
        status: t.status, priority: 'Medium',
        dueDate: '', assignedTo: op.assignee || '',
        completionDate: t.completionDate || '', completedBy: '',
        skipReason: '', history: t.history || [],
      })),
      timeLogs: [],
      history: op.history || [],
    });
  });
}

// ─────────────────────────────────────────────
//  SETTINGS / USERS
// ─────────────────────────────────────────────
function currentUser() {
  const d = getData();
  return d.settings.currentUser.trim() || 'Unknown user';
}
function isAdmin() { return getData().settings.role === 'admin'; }

function setCurrentUser(name) {
  const d = getData();
  d.settings.currentUser = name.trim();
  saveData(d);
}
function setCurrentRole(role) {
  const d = getData();
  d.settings.role = role;
  saveData(d);
  if (currentView === 'templates' || currentView === 'templateEdit') navigate('projects');
  else render();
}

// ─────────────────────────────────────────────
//  TEMPLATES
// ─────────────────────────────────────────────
function getTemplate(data, id) { return data.templates.find(t => t.id === id) || null; }
function activeTemplates(data) { return data.templates.filter(t => t.isActive); }
function defaultTemplate(data) {
  return data.templates.find(t => t.isDefault && t.isActive) || activeTemplates(data)[0] || null;
}

function setDefaultTemplate(id) {
  const d = getData();
  d.templates.forEach(t => t.isDefault = (t.id === id));
  saveData(d);
  render();
}
function toggleTemplateActive(id) {
  const d = getData();
  const t = getTemplate(d, id);
  if (!t) return;
  if (t.isActive && t.isDefault) { alert('Set another template as default before deactivating this one.'); return; }
  t.isActive = !t.isActive;
  saveData(d);
  render();
}

// ─────────────────────────────────────────────
//  PROJECTS
// ─────────────────────────────────────────────
function padId(n) { return 'PRJ-' + String(n).padStart(4, '0'); }
function findProject(data, id) { return data.projects.find(p => p.id === id) || null; }
function getProject(id) { return findProject(getData(), id); }
function isTerminal(p) { return TERMINAL_STATUSES.includes(p.status); }
function activeProjects(data) { return data.projects.filter(p => !isTerminal(p)); }
function historicalProjects(data) { return data.projects.filter(p => isTerminal(p)); }

function activityEntry(text) {
  return { type: 'activity', text, user: currentUser(), ts: Date.now() };
}

function addDaysISO(dateStr, days) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d + days);
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const dd = String(dt.getDate()).padStart(2, '0');
  return `${dt.getFullYear()}-${mm}-${dd}`;
}
function todayISO() {
  const dt = new Date();
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const dd = String(dt.getDate()).padStart(2, '0');
  return `${dt.getFullYear()}-${mm}-${dd}`;
}

// Enforces "one active project per MCP". Returns { error } or { id }.
function createProject({ mcpNum, mcpName, assignee, assignmentDate, templateId }) {
  const data = getData();
  const dup = activeProjects(data).find(p => p.mcpNum.trim().toLowerCase() === mcpNum.trim().toLowerCase());
  if (dup) return { error: `MCP ${mcpNum} already has an active project (${dup.id}). Close it before creating a new one.` };

  const tpl = getTemplate(data, templateId);
  if (!tpl) return { error: 'Select a workflow template.' };

  const id = padId(data.nextProjectId++);
  const ts = Date.now();
  const tasks = tpl.tasks.map((tt, i) => ({
    id: i + 1,
    templateTaskId: tt.id,
    name: tt.name,
    description: tt.description || '',
    order: tt.order,
    required: !!tt.required,
    isAdHoc: false,
    status: 'Not Started',
    priority: tt.priority || 'Medium',
    dueDate: tt.dueOffsetDays != null ? addDaysISO(assignmentDate, tt.dueOffsetDays) : '',
    assignedTo: assignee,
    completionDate: '', completedBy: '', skipReason: '',
    history: [],
  }));

  const project = {
    id, mcpNum: mcpNum.trim(), mcpName: mcpName.trim(),
    assignee, assignmentDate,
    templateId: tpl.id, templateName: tpl.name,
    status: 'Assigned',
    riskLevel: 'Low',
    ragOverride: null,
    createdDate: ts, createdBy: currentUser(),
    closedDate: null, closedBy: '', closeReason: '', finalSummary: '', cancelReason: '',
    nextTaskId: tasks.length + 1,
    nextLogId: 1,
    tasks, timeLogs: [],
    history: [activityEntry(`${currentUser()} created the project from template "${tpl.name}" (${tasks.length} tasks)`)],
  };
  data.projects.push(project);
  saveData(data);
  return { id };
}

function setProjectStatus(projectId, status) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p) || p.status === status) return;
  p.history.push(activityEntry(`${currentUser()} changed project status from "${p.status}" to "${status}"`));
  p.status = status;
  saveData(data);
  render();
}

function setRiskLevel(projectId, level) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p) || p.riskLevel === level) return;
  p.history.push(activityEntry(`${currentUser()} changed risk level from "${p.riskLevel}" to "${level}"`));
  p.riskLevel = level;
  saveData(data);
  render();
}

// ── RAG: auto-calculated with optional manual override ──
function calcRag(p) {
  if (isTerminal(p)) return null;
  const today = todayISO();
  const openTasks = p.tasks.filter(t => OPEN_TASK(t.status));

  if (openTasks.some(t => t.status === 'Blocked')) return 'Red';
  if (openTasks.some(t => t.required && t.dueDate && t.dueDate < today)) return 'Red';

  const soon = addDaysISO(today, 3);
  if (openTasks.some(t => t.dueDate && t.dueDate <= soon)) return 'Amber';
  const last = lastActivityTs(p);
  if (Date.now() - last > 7 * 24 * 3600 * 1000) return 'Amber';
  if (['High', 'Critical'].includes(p.riskLevel)) return 'Amber';

  return 'Green';
}
function effectiveRag(p) {
  if (isTerminal(p)) return null;
  return p.ragOverride ? p.ragOverride.value : calcRag(p);
}
function lastActivityTs(p) {
  let last = p.createdDate || 0;
  (p.history || []).forEach(h => { if (h.ts > last) last = h.ts; });
  p.tasks.forEach(t => (t.history || []).forEach(h => { if (h.ts > last) last = h.ts; }));
  (p.timeLogs || []).forEach(l => { if (l.createdTs > last) last = l.createdTs; });
  return last;
}

function setRagOverride(projectId, value, reason) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p) return;
  p.ragOverride = { value, reason, by: currentUser(), ts: Date.now() };
  p.history.push(activityEntry(`${currentUser()} manually set RAG to ${value} — ${reason}`));
  saveData(data);
  render();
}
function clearRagOverride(projectId) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || !p.ragOverride) return;
  p.ragOverride = null;
  p.history.push(activityEntry(`${currentUser()} cleared the manual RAG override (back to auto-calculated)`));
  saveData(data);
  render();
}

// ─────────────────────────────────────────────
//  TASKS
// ─────────────────────────────────────────────
function applyTaskStatus(projectId, taskId, newStatus, skipReason) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const t = p.tasks.find(t => t.id === taskId);
  if (!t || t.status === newStatus) return;

  const oldStatus = t.status;
  const ts = Date.now();
  const user = currentUser();

  t.status = newStatus;
  if (newStatus === 'Complete') {
    t.completionDate = t.completionDate || todayISO();
    t.completedBy = user;
  }
  if (newStatus === 'Skipped' && skipReason) t.skipReason = skipReason;

  let text = `${user} changed "${t.name}" from ${oldStatus} to ${newStatus}`;
  if (newStatus === 'Skipped' && skipReason) text += ` — reason: ${skipReason}`;
  t.history.push({ type: 'activity', text: `${user} changed status from ${oldStatus} to ${newStatus}` + (skipReason ? ` — reason: ${skipReason}` : ''), user, ts });
  p.history.push({ type: 'activity', text, user, ts });

  autoAdvanceProjectStatus(p);
  saveData(data);
  render();
}

// Status inference: first task activity bumps New/Assigned → In Progress;
// all required tasks resolved bumps → Ready to Close.
function autoAdvanceProjectStatus(p) {
  const user = currentUser();
  if (['New', 'Assigned'].includes(p.status) && p.tasks.some(t => t.status !== 'Not Started')) {
    p.history.push({ type: 'activity', text: `Project status automatically moved from "${p.status}" to "In Progress"`, user, ts: Date.now() });
    p.status = 'In Progress';
  }
  const reqOpen = p.tasks.filter(t => t.required && OPEN_TASK(t.status));
  if (reqOpen.length === 0 && !isTerminal(p) && p.status !== 'Ready to Close') {
    p.history.push({ type: 'activity', text: `All required tasks resolved — project status automatically moved to "Ready to Close"`, user, ts: Date.now() });
    p.status = 'Ready to Close';
  }
}

function updateTaskField(projectId, taskId, field, value, label) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const t = p.tasks.find(t => t.id === taskId);
  if (!t || t[field] === value) return;
  t[field] = value;
  if (label) t.history.push(activityEntry(`${currentUser()} ${label}`));
  saveData(data);
}

function addAdHocTask(projectId, { name, priority, dueDate, assignedTo }) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const maxOrder = p.tasks.reduce((m, t) => Math.max(m, t.order), 0);
  const t = {
    id: p.nextTaskId++,
    templateTaskId: null,
    name, description: '',
    order: maxOrder + 1,
    required: false, isAdHoc: true,
    status: 'Not Started',
    priority: priority || 'Medium',
    dueDate: dueDate || '',
    assignedTo: assignedTo || p.assignee,
    completionDate: '', completedBy: '', skipReason: '',
    history: [],
  };
  p.tasks.push(t);
  p.history.push(activityEntry(`${currentUser()} added ad-hoc task "${name}"`));
  saveData(data);
  render();
}

// Only ad-hoc tasks may be removed — template tasks are protected.
function removeAdHocTask(projectId, taskId) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const t = p.tasks.find(t => t.id === taskId);
  if (!t || !t.isAdHoc) return;
  p.tasks = p.tasks.filter(x => x.id !== taskId);
  p.timeLogs = p.timeLogs.filter(l => l.taskId !== taskId);
  p.history.push(activityEntry(`${currentUser()} removed ad-hoc task "${t.name}"`));
  saveData(data);
  render();
}

// ─────────────────────────────────────────────
//  TIME LOGS
// ─────────────────────────────────────────────
function addTimeLog(projectId, { taskId, date, hours, minutes, activityType, notes }) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const t = p.tasks.find(t => t.id === taskId);
  const user = currentUser();
  const log = {
    id: p.nextLogId++,
    taskId, user, date,
    hours: hours | 0, minutes: minutes | 0,
    activityType, notes: notes || '',
    createdTs: Date.now(), edited: false,
  };
  p.timeLogs.push(log);
  const dur = fmtDuration(log.hours * 60 + log.minutes);
  const entry = activityEntry(`${user} logged ${dur} (${activityType}) on "${t ? t.name : 'task'}"${notes ? ' — ' + notes : ''}`);
  p.history.push(entry);
  if (t) t.history.push({ ...entry, text: `${user} logged ${dur} (${activityType})${notes ? ' — ' + notes : ''}` });
  saveData(data);
  render();
}

function canEditLog(log) { return isAdmin() || log.user === currentUser(); }

function updateTimeLog(projectId, logId, fields) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const log = p.timeLogs.find(l => l.id === logId);
  if (!log || !canEditLog(log)) return;
  Object.assign(log, fields, { edited: true });
  p.history.push(activityEntry(`${currentUser()} edited a time log (now ${fmtDuration(log.hours * 60 + log.minutes)}, ${log.activityType})`));
  saveData(data);
  render();
}

function deleteTimeLog(projectId, logId) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const log = p.timeLogs.find(l => l.id === logId);
  if (!log || !canEditLog(log)) return;
  p.timeLogs = p.timeLogs.filter(l => l.id !== logId);
  p.history.push(activityEntry(`${currentUser()} deleted a time log of ${fmtDuration(log.hours * 60 + log.minutes)} (${log.activityType})`));
  saveData(data);
  render();
}

function taskMinutes(p, taskId) {
  return p.timeLogs.filter(l => l.taskId === taskId).reduce((s, l) => s + l.hours * 60 + l.minutes, 0);
}
function projectMinutes(p) {
  return p.timeLogs.reduce((s, l) => s + l.hours * 60 + l.minutes, 0);
}
function fmtDuration(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h && m) return `${h}h ${m}m`;
  if (h) return `${h}h`;
  return `${m}m`;
}

// ─────────────────────────────────────────────
function closureBlockers(p) {
  return p.tasks.filter(t => t.required && OPEN_TASK(t.status));
}

function closeProject(projectId, { finalSummary, closeReason, overridden }) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const user = currentUser();
  p.status = 'Closed';
  p.closedDate = Date.now();
  p.closedBy = user;
  p.closeReason = closeReason;
  p.finalSummary = finalSummary;
  p.ragOverride = null;
  let text = `${user} closed the project — reason: ${closeReason}`;
  if (overridden) text += ' (admin override: required tasks incomplete)';
  p.history.push(activityEntry(text));
  saveData(data);
}

function cancelProject(projectId, reason) {
  const data = getData();
  const p = findProject(data, projectId);
  if (!p || isTerminal(p)) return;
  const user = currentUser();
  p.status = 'Cancelled';
  p.closedDate = Date.now();
  p.closedBy = user;
  p.closeReason = 'Cancelled';
  p.cancelReason = reason;
  p.ragOverride = null;
  p.history.push(activityEntry(`${user} cancelled the project — reason: ${reason}`));
  saveData(data);
}

function progressText(project) {
  const done = project.tasks.filter(t => !OPEN_TASK(t.status)).length;
  return { done, total: project.tasks.length };
}
function daysOpen(p) {
  const start = p.assignmentDate ? new Date(p.assignmentDate + 'T00:00:00').getTime() : p.createdDate;
  const end = p.closedDate || Date.now();
  return Math.max(0, Math.round((end - start) / 86400000));
}

function loadUiState() {
  try {
    const s = JSON.parse(sessionStorage.getItem(UI_STATE_KEY));

    if (['list', 'kanban', 'timecard'].includes(s.viewMode)) projectViewMode = s.viewMode;

    if (s.projectFilter) projectFilter = { status: '', rag: '', search: '', ...s.projectFilter };
  } catch {}
}
function saveUiState() {
  try {
    sessionStorage.setItem(UI_STATE_KEY, JSON.stringify({ viewMode: projectViewMode, kanbanFilter, projectFilter }));
  } catch {}
}

// ── Days since update ──
function daysSinceUpdate(p) {
  return Math.max(0, Math.floor((Date.now() - lastActivityTs(p)) / 86400000));
}
const AGE_BUCKETS = [
  { key: 'fresh', label: 'Fresh — updated 0–7 days ago',  cls: 'upd-green' },
  { key: 'aging', label: 'Aging — updated 8–14 days ago', cls: 'upd-yellow' },
  { key: 'stale', label: 'Stale — updated 15+ days ago',  cls: 'upd-red' },
];
function ageBucketKey(days) { return days <= 7 ? 'fresh' : days <= 14 ? 'aging' : 'stale'; }
function updatedBadge(p) {
  const days = daysSinceUpdate(p);
  const cls = AGE_BUCKETS.find(b => b.key === ageBucketKey(days)).cls;
  const label = days === 0 ? 'Today' : days === 1 ? '1 day ago' : `${days} days ago`;
  return `<span class="upd-badge ${cls}" title="Days since last update">Updated: ${label}</span>`;
}

function navigate(view, id) {
  currentView = view;
  if (view === 'detail') currentProjectId = id;
  if (view === 'templateEdit') { currentTemplateId = id || null; tplDraft = null; }
  closeDrawer();
  dismissModal();
  render();
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function taskBadgeClass(status) { return 'badge badge-' + status.toLowerCase().replace(/ /g, '-'); }
function projectBadge(status) {
  return `<span class="badge badge-p-${status.toLowerCase().replace(/ /g, '-')}">${escHtml(status)}</span>`;
}
function ragChip(p) {
  const rag = effectiveRag(p);
  if (!rag) return '<span class="text-muted" style="font-size:12px">—</span>';
  const manual = p.ragOverride ? ` <span class="rag-manual">manual</span>` : '';
  const title = p.ragOverride ? `Manually set by ${p.ragOverride.by}: ${p.ragOverride.reason}` : 'Auto-calculated from blockers, overdue tasks and staleness';
  return `<span class="rag-chip rag-${rag.toLowerCase()}" title="${escHtml(title)}"><span class="rag-dot"></span>${rag}${manual}</span>`;
}
function riskBadge(level) {
  return `<span class="badge risk-${level.toLowerCase()}">${escHtml(level)}</span>`;
}
function prioChip(pr) { return `<span class="prio-chip prio-${pr.toLowerCase()}">${escHtml(pr)}</span>`; }

function statusSelectStyle(select) {
  const map = {
    'Not Started': '#f1f5f9', 'In Progress': '#dbeafe', 'Blocked': '#fee2e2',
    'Complete': '#dcfce7', 'Skipped': '#fef9c3', 'Cancelled': '#f3f4f6',
  };
  select.style.background = map[select.value] || '#fff';
}

function formatTs(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    + ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function formatDateShort(dateStr) {
  if (!dateStr) return '—';
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function selOptions(list, selected) {
  return list.map(v => `<option value="${escHtml(v)}" ${v === selected ? 'selected' : ''}>${escHtml(v)}</option>`).join('');
}

function openModal(html) {

  overlay.addEventListener('click', e => { if (e.target === overlay) dismissModal(); });
  overlay.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  document.body.appendChild(overlay);
}
function dismissModal() { document.getElementById('modalOverlay')?.remove(); }
function modalError(msg) {
  const el = document.getElementById('modalError');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ── List view ──
function renderProjectListView() {
  const data = getData();
  let list = activeProjects(data);

  if (projectFilter.status) list = list.filter(p => p.status === projectFilter.status);
  if (projectFilter.rag) list = list.filter(p => effectiveRag(p) === projectFilter.rag);
  if (projectFilter.search) {
    const q = projectFilter.search.toLowerCase();
    list = list.filter(p => (p.id + ' ' + p.mcpNum + ' ' + p.mcpName + ' ' + p.assignee).toLowerCase().includes(q));
  }

  const rows = list.length === 0
    ? `<tr class="empty-row"><td colspan="9">No active projects match.</td></tr>`
    : list.map(p => {
        const { done, total } = progressText(p);

          <tr class="clickable" onclick="navigate('detail','${escHtml(p.id)}')">

          </select>

            <option value="">All RAG</option>

}

// ── Kanban view ──
// Columns are generated from PROJECT_STATUSES, so adding/removing a status
// automatically adds/removes a column.
function mcpLabel(p) {
  const num = String(p.mcpNum || '').trim();
  return /^mcp/i.test(num) ? num : 'MCP-' + num;
}

function kanbanAssignees(data) {
  const set = new Set();
  activeProjects(data).forEach(p => set.add(p.assignee || 'Unassigned'));
  return [...set].sort((a, b) => a.localeCompare(b));
}

function kanbanFilteredProjects(data) {
  const f = kanbanFilter;
  let list = activeProjects(data);
  if (f.assignee.length) list = list.filter(p => f.assignee.includes(p.assignee || 'Unassigned'));
  if (f.rag.length)      list = list.filter(p => f.rag.includes(effectiveRag(p) || ''));
  if (f.age.length)      list = list.filter(p => f.age.includes(ageBucketKey(daysSinceUpdate(p))));
  return list; // status filter is applied per-column
}

function kanbanHasFilters() {
  const f = kanbanFilter;
  return !!(f.assignee.length || f.status.length || f.rag.length || f.age.length);
}

const MS_LABELS = { assignee: 'Assignee', status: 'Status', rag: 'RAG', age: 'Age' };

function msBtnInner(key) {
  const n = kanbanFilter[key].length;
  return `${MS_LABELS[key]}${n ? `<span class="ms-count">${n}</span>` : ''}<span class="ms-caret">▾</span>`;

function msDropdown(key, options) {
  return `
    <div class="ms-dd" data-mskey="${key}">
      <button class="ms-btn ${kanbanFilter[key].length ? 'has-sel' : ''}" onclick="toggleMsPanel(event,'${key}')">${msBtnInner(key)}</button>
      <div class="ms-panel hidden" id="msPanel-${key}">
        ${options.length === 0 ? '<div class="ms-empty">No options</div>' : options.map(o => `
          <label class="ms-opt">
            <input type="checkbox" data-val="${escHtml(o.value)}" ${kanbanFilter[key].includes(o.value) ? 'checked' : ''} onchange="msToggle('${key}', this)" />
            ${o.dot ? `<span class="rag-dot" style="background:${o.dot}"></span>` : ''}${escHtml(o.label)}
          </label>`).join('')}
      </div>
    </div>`;
}

function toggleMsPanel(e, key) {
  e.stopPropagation();
  const panel = document.getElementById('msPanel-' + key);
  const wasHidden = panel.classList.contains('hidden');
  closeAllMsPanels();
  if (wasHidden) panel.classList.remove('hidden');
}
function closeAllMsPanels() {
  document.querySelectorAll('.ms-panel').forEach(p => p.classList.add('hidden'));
}
document.addEventListener('click', e => { if (!e.target.closest('.ms-dd')) closeAllMsPanels(); });

// Toggle one filter value; refresh only the board so the dropdown stays open.
function msToggle(key, cb) {
  const val = cb.dataset.val;
  const arr = kanbanFilter[key];
  const i = arr.indexOf(val);
  if (cb.checked && i === -1) arr.push(val);
  if (!cb.checked && i !== -1) arr.splice(i, 1);
  saveUiState();
  refreshKanbanBoard();
}

function clearKanbanFilters() {
  kanbanFilter = { assignee: [], status: [], rag: [], age: [] };
  saveUiState();
  render();
}

function refreshKanbanBoard() {
  const wrap = document.getElementById('kbBoardWrap');
  if (wrap) wrap.outerHTML = renderKanbanBoard();
  document.querySelectorAll('.ms-dd').forEach(dd => {
    const key = dd.dataset.mskey;
    const btn = dd.querySelector('.ms-btn');
    btn.innerHTML = msBtnInner(key);
    btn.classList.toggle('has-sel', kanbanFilter[key].length > 0);
  });
  const clearBtn = document.getElementById('kbClearBtn');
  if (clearBtn) clearBtn.disabled = !kanbanHasFilters();
  const summary = document.getElementById('kbSummary');
  if (summary) summary.textContent = kanbanSummaryText();
}

function kanbanSummaryText() {
  const data = getData();
  const total = activeProjects(data).length;
  const shown = kanbanFilteredProjects(data).filter(p =>
    !kanbanFilter.status.length || kanbanFilter.status.includes(p.status)).length;
  return shown === total ? `${total} project${total !== 1 ? 's' : ''}` : `${shown} of ${total} projects`;
}

function renderKanban() {
  const data = getData();
  const ragDots = { Red: 'var(--viz-critical)', Amber: 'var(--viz-warning)', Green: 'var(--viz-good)' };
  const filterBar = `
    <div class="kb-filterbar">
      <span class="kb-filter-label">Filters</span>

      ${msDropdown('rag', ['Red', 'Amber', 'Green'].map(r => ({ value: r, label: r, dot: ragDots[r] })))}
      ${msDropdown('age', AGE_BUCKETS.map(b => ({ value: b.key, label: b.label })))}

function editDrawerError(msg) {
  const el = document.getElementById('editError');
  if (el) { el.textContent = msg; el.classList.remove('hidden'); }
}

function saveEditDrawer() {
  const data = getData();
  const p = findProject(data, editDrawerProjectId);
  if (!p || isTerminal(p)) { closeDrawer(); return; }

  const newId    = document.getElementById('e_id').value.trim();
  const mcpNum   = document.getElementById('e_mcpNum').value.trim();
  const mcpName  = document.getElementById('e_mcpName').value.trim();
  const assignee = document.getElementById('e_assignee').value.trim();
  const status   = document.getElementById('e_status').value;
  const ragSel   = document.getElementById('e_rag').value; // '' = auto
  const progress = Math.max(0, parseInt(document.getElementById('e_progress').value, 10) || 0);
  const ageDays  = Math.max(0, parseInt(document.getElementById('e_age').value, 10) || 0);

  if (!newId)   return editDrawerError('Project ID is required.');
  if (!mcpNum)  return editDrawerError('MCP Number is required.');
  if (!mcpName) return editDrawerError('MCP Name is required.');
  if (newId.toLowerCase() !== p.id.toLowerCase()
      && data.projects.some(x => x !== p && x.id.toLowerCase() === newId.toLowerCase()))
    return editDrawerError(`Project ID ${newId} is already in use.`);
  const dupMcp = activeProjects(data).find(x => x !== p && x.mcpNum.trim().toLowerCase() === mcpNum.toLowerCase());
  if (dupMcp) return editDrawerError(`MCP ${mcpNum} already has an active project (${dupMcp.id}).`);

  const user = currentUser();
  const ts = Date.now();
  const logChange = text => p.history.push({ type: 'activity', text: `${user} ${text}`, user, ts });

  if (newId !== p.id) {
    logChange(`changed Project ID from ${p.id} to ${newId}`);
    if (currentProjectId === p.id) currentProjectId = newId;
    p.id = newId;
  }
  if (mcpNum !== p.mcpNum)     { logChange(`changed MCP Number from ${p.mcpNum} to ${mcpNum}`); p.mcpNum = mcpNum; }
  if (mcpName !== p.mcpName)   { logChange(`changed MCP Name from "${p.mcpName}" to "${mcpName}"`); p.mcpName = mcpName; }
  if (assignee !== p.assignee) { logChange(`reassigned the project from ${p.assignee || '—'} to ${assignee || '—'}`); p.assignee = assignee; }

  const before = progressText(p);
  const target = Math.min(progress, before.total);
  if (target !== before.done) {
    applyProgressTarget(p, target, user, ts);
    const after = progressText(p);
    logChange(`updated progress from ${before.done}/${before.total} to ${after.done}/${after.total}`);
  }

  if (ageDays !== daysOpen(p)) {
    const oldAge = daysOpen(p), oldDate = p.assignmentDate;
    p.assignmentDate = addDaysISO(todayISO(), -ageDays);
    // daysOpen rounds to the nearest day, so late in the day a date exactly
    // N days back reads as N+1 — nudge forward so the entered age round-trips
    if (daysOpen(p) > ageDays) p.assignmentDate = addDaysISO(p.assignmentDate, 1);
    logChange(`changed project age from ${oldAge} to ${daysOpen(p)} days (assignment date ${oldDate || '—'} → ${p.assignmentDate})`);
  }

  if (status !== p.status) {
    logChange(`changed project status from "${p.status}" to "${status}"`);
    p.status = status;
  }

  const curOverride = p.ragOverride ? p.ragOverride.value : '';
  if (ragSel !== curOverride) {
    if (!ragSel) {
      p.ragOverride = null;
      logChange('cleared the manual RAG override (back to auto-calculated)');
    } else {
      p.ragOverride = { value: ragSel, reason: 'Set from the project edit drawer', by: user, ts };
      logChange(`manually set RAG to ${ragSel} (from the project edit drawer)`);
    }
  }

  saveData(data);
  movedProjectId = p.id;
  closeDrawer();
  render();
  movedProjectId = null; // highlight applies only to this refresh
}

// Marks the next open tasks Complete (in workflow order) to raise progress,
// or reopens the most recently completed tasks to lower it. Skipped/Cancelled
// tasks are never touched.
function applyProgressTarget(p, target, user, ts) {
  const ordered = [...p.tasks].sort((a, b) => a.order - b.order);
  let done = ordered.filter(t => !OPEN_TASK(t.status)).length;
  if (target > done) {
    for (const t of ordered) {
      if (done >= target) break;
      if (!OPEN_TASK(t.status)) continue;
      t.status = 'Complete';
      t.completionDate = t.completionDate || todayISO();
      t.completedBy = user;
      t.history.push({ type: 'activity', text: `${user} marked the task Complete from the project edit drawer`, user, ts });
      done++;
    }
  } else {
    for (const t of [...ordered].reverse()) {
      if (done <= target) break;
      if (t.status !== 'Complete') continue;
      t.status = 'Not Started';
      t.completionDate = '';
      t.completedBy = '';
      t.history.push({ type: 'activity', text: `${user} reopened the task from the project edit drawer`, user, ts });
      done--;
    }
  }
}

  const totalMins = projectMinutes(p);

  const banner = !locked ? '' : (p.status === 'Closed'
    ? `<div class="closed-banner"><strong>Closed</strong> by ${escHtml(p.closedBy || '—')} on ${p.closedDate ? formatTs(p.closedDate) : '—'} · Reason: ${escHtml(p.closeReason || '—')} — this project is a permanent read-only record. If this MCP needs the process again, create a new project.</div>`

  const templateTasks = p.tasks.filter(t => !t.isAdHoc).sort((a, b) => a.order - b.order);
  const adhocTasks = p.tasks.filter(t => t.isAdHoc).sort((a, b) => a.order - b.order);

  const taskRow = (t, idx, adhoc) => {
    const today = todayISO();
    const overdue = OPEN_TASK(t.status) && t.dueDate && t.dueDate < today;
    const mins = taskMinutes(p, t.id);
    return `
      <div class="task-row">

          </div>
          <div class="task-sub">
            ${prioChip(t.priority)}
            ${t.assignedTo ? `<span>${escHtml(t.assignedTo)}</span>` : ''}
            ${mins ? `<span title="Time logged">⏱ ${fmtDuration(mins)}</span>` : ''}
            ${overdue ? `<span class="overdue-flag">OVERDUE</span>` : ''}
            ${t.status === 'Skipped' && t.skipReason ? `<span title="Skip reason">Skipped: ${escHtml(t.skipReason)}</span>` : ''}
            ${t.status === 'Complete' && t.completedBy ? `<span>Done by ${escHtml(t.completedBy)} ${formatDateShort(t.completionDate)}</span>` : ''}
          </div>
        </div>
        <select class="task-select" onchange="handleTaskStatus('${escHtml(p.id)}', ${t.id}, this)" ${locked ? 'disabled' : ''}>

        <div class="meta-item"><div class="meta-label">MCP Name</div><div class="meta-value">${escHtml(p.mcpName)}</div></div>
        <div class="meta-item"><div class="meta-label">Assignee</div><div class="meta-value">${escHtml(p.assignee)}</div></div>

          <div class="meta-label">Progress</div>
          <div class="meta-value" style="display:flex;align-items:center;gap:8px">

        <div></div>

        <div class="task-col-label">Status</div>

        <div class="task-section-header"><span class="task-section-title">Ad-hoc tasks</span></div>
        ${adhocTasks.map((t) => taskRow(t, 0, true)).join('')}` : ''}

}

function renderTimeCard(p, locked) {
  const logs = [...p.timeLogs].sort((a, b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : b.id - a.id));
  const totalMins = projectMinutes(p);
  const byType = {};
  p.timeLogs.forEach(l => { byType[l.activityType] = (byType[l.activityType] || 0) + l.hours * 60 + l.minutes; });
  const topType = Object.entries(byType).sort((a, b) => b[1] - a[1])[0];

  const rows = logs.length === 0
    ? `<tr class="empty-row"><td colspan="7">No time logged yet.</td></tr>`
    : logs.map(l => {
        const t = p.tasks.find(t => t.id === l.taskId);
        return `
          <tr>
            <td>${formatDateShort(l.date)}</td>
            <td>${escHtml(l.user)}${l.edited ? ' <span class="text-muted" style="font-size:10px">(edited)</span>' : ''}</td>
            <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(t ? t.name : '')}">${escHtml(t ? t.name : '—')}</td>
            <td class="fw-600">${fmtDuration(l.hours * 60 + l.minutes)}</td>
            <td>${escHtml(l.activityType)}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(l.notes)}">${escHtml(l.notes || '—')}</td>
            <td>
              ${!locked && canEditLog(l) ? `
                <div class="task-actions">
                  <button class="btn-notes" onclick="showTimeLogModal('${escHtml(p.id)}', ${l.taskId}, ${l.id})">Edit</button>
                  <button class="btn-notes danger" onclick="showDeleteLog('${escHtml(p.id)}', ${l.id})">✕</button>
                </div>` : ''}
            </td>
          </tr>`;
      }).join('');

  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">Time Log</span>
        ${!locked ? `<button class="btn btn-ghost btn-sm" onclick="showTimeLogModal('${escHtml(p.id)}')">+ Log Time</button>` : ''}
      </div>
      <div class="time-summary">
        <div class="time-stat"><span class="time-stat-value">${totalMins ? fmtDuration(totalMins) : '0m'}</span><span class="time-stat-label">Total logged</span></div>
        <div class="time-stat"><span class="time-stat-value">${p.timeLogs.length}</span><span class="time-stat-label">Entries</span></div>
        <div class="time-stat"><span class="time-stat-value" style="font-size:14px;padding-top:5px">${topType ? escHtml(topType[0]) : '—'}</span><span class="time-stat-label">Top activity</span></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>User</th><th>Task</th><th>Duration</th><th>Activity</th><th>Notes</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── task handlers ──
function handleTaskStatus(projectId, taskId, select) {
  const p = getProject(projectId);
  const t = p && p.tasks.find(t => t.id === taskId);
  if (!t) return;
  const newStatus = select.value;
  if (newStatus === 'Skipped' && t.required) {
    showSkipReasonModal(projectId, taskId, t.status, select);
    return;
  }
  applyTaskStatus(projectId, taskId, newStatus);
}

function handleTaskDue(projectId, taskId, value) {
  updateTaskField(projectId, taskId, 'dueDate', value, `set due date to ${value ? formatDateShort(value) : 'none'}`);
  render();
}

// ── modals ──
function showSkipReasonModal(projectId, taskId, oldStatus, select) {
  const p = getProject(projectId);
  const t = p.tasks.find(t => t.id === taskId);
  openModal(`
    <div class="modal-header"><div class="modal-title">Skip required task?</div></div>
    <div class="modal-body">
      <div class="text-muted" style="font-size:13px">"${escHtml(t.name)}" is a <strong>required</strong> task. A reason is required to formally skip it.</div>
      <div class="form-group"><label>Skip reason</label><textarea id="m_skipReason" placeholder="Why is this task being skipped?"></textarea></div>
      <div class="modal-error" id="modalError"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cancelSkip('${escHtml(projectId)}')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmSkip('${escHtml(projectId)}', ${taskId})">Skip Task</button>
    </div>`);
  window._skipRevert = { select, oldStatus };
}
function cancelSkip() {
  if (window._skipRevert) { window._skipRevert.select.value = window._skipRevert.oldStatus; statusSelectStyle(window._skipRevert.select); }
  window._skipRevert = null;
  dismissModal();
}
function confirmSkip(projectId, taskId) {
  const reason = document.getElementById('m_skipReason').value.trim();
  if (!reason) { modalError('A skip reason is required.'); return; }
  window._skipRevert = null;
  dismissModal();
  applyTaskStatus(projectId, taskId, 'Skipped', reason);
}

function showTimeLogModal(projectId, taskId, logId) {
  const p = getProject(projectId);
  const editing = logId != null ? p.timeLogs.find(l => l.id === logId) : null;
  const selTask = editing ? editing.taskId : taskId;
  const openTasks = p.tasks;
  openModal(`
    <div class="modal-header"><div class="modal-title">${editing ? 'Edit Time Log' : 'Log Time'}</div></div>
    <div class="modal-body">
      <div class="form-group"><label>Task</label>
        <select id="m_logTask">${openTasks.map(t => `<option value="${t.id}" ${t.id===selTask?'selected':''}>${escHtml(t.name)}</option>`).join('')}</select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
        <div class="form-group"><label>Date</label><input type="date" id="m_logDate" value="${editing ? escHtml(editing.date) : todayISO()}" /></div>
        <div class="form-group"><label>Hours</label><input type="number" id="m_logHours" min="0" max="24" value="${editing ? editing.hours : 0}" /></div>
        <div class="form-group"><label>Minutes</label><input type="number" id="m_logMins" min="0" max="59" step="5" value="${editing ? editing.minutes : 30}" /></div>
      </div>
      <div class="form-group"><label>Activity type</label><select id="m_logType">${selOptions(ACTIVITY_TYPES, editing ? editing.activityType : ACTIVITY_TYPES[0])}</select></div>
      <div class="form-group"><label>Notes (optional)</label><input type="text" id="m_logNotes" value="${editing ? escHtml(editing.notes) : ''}" placeholder="What was done?" /></div>
      <div class="modal-error" id="modalError"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="dismissModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmTimeLog('${escHtml(projectId)}', ${logId != null ? logId : 'null'})">${editing ? 'Save Changes' : 'Log Time'}</button>
    </div>`);
}
function confirmTimeLog(projectId, logId) {
  const hours = parseInt(document.getElementById('m_logHours').value, 10) || 0;
  const minutes = parseInt(document.getElementById('m_logMins').value, 10) || 0;
  const date = document.getElementById('m_logDate').value;
  if (!date) { modalError('Date is required.'); return; }
  if (hours * 60 + minutes <= 0) { modalError('Enter a duration greater than zero.'); return; }
  const fields = {
    taskId: parseInt(document.getElementById('m_logTask').value, 10),
    date, hours, minutes,
    activityType: document.getElementById('m_logType').value,
    notes: document.getElementById('m_logNotes').value.trim(),
  };
  dismissModal();
  if (logId != null) updateTimeLog(projectId, logId, fields);
  else addTimeLog(projectId, fields);
}

  openModal(`
    <div class="modal-header"><div class="modal-title">Delete time log?</div></div>
    <div class="confirm-body">This removes the time entry. The deletion is recorded in the project activity history.</div>
    <div class="confirm-actions">
